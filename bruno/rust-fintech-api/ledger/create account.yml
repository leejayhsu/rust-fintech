info:
  name: create account
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/v1/ledger/accounts
  body:
    type: json
    data: |-
      {
        "owner_id": "user-123",
        "name": "Main Checking",
        "currency_code": "USD",
        "is_neg_balance_allowed": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
